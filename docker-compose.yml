version: "3.9"

services:
  # ── Django + Gunicorn ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: stepo_web
    restart: always
    env_file:
      - .env
    volumes:
      - reports_data:/app/reports
      - static_data:/app/staticfiles
      - ./scholarships.xlsx:/app/scholarships.xlsx   # dataset file
      - ./watermark.png:/app/watermark.png           # watermark asset
      - ./db.sqlite3:/app/db.sqlite3                 # SQLite persistence
    expose:
      - "8000"
    depends_on:
      - nginx

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: stepo_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - reports_data:/app/reports:ro
    # nginx starts first; web depends_on nginx so the network is ready

volumes:
  reports_data:
  static_data:
