services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: stepo_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: stepo_web
    restart: always
    env_file:
      - .env
    volumes:
      - reports_data:/app/reports
      - static_data:/app/staticfiles
      - ./scholarships.xlsx:/app/scholarships.xlsx
      - ./watermark.png:/app/watermark.png
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: stepo_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - reports_data:/app/reports:ro
    depends_on:
      - web

volumes:
  postgres_data:
  reports_data:
  static_data:
